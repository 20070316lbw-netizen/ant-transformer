model:
  model_type: "financial"
  model_arch: "full"
  input_dim: 6
  d_model: 256
  num_heads: 8
  num_layers: 4
  d_ff: 1024
  cross_layer_heads: 4
  gate_hidden_dim: 64
  dropout: 0.1
  enable_layer_pruning: true
  use_grouped_freq_attention: false
  num_head_groups: 4
  group_mix_coeff: 0.1

data:
  seq_len: 6
  train_end: "2023-12-31"
  val_end: "2024-12-31"

training:
  epochs: 30
  batch_size: 1024
  lr: 0.001
  gate_lambda: 0.08
  max_grad_norm: 1.0

experiment:
  use_subset: false
  output_prefix: "outputs/ablation/ic_baseline"
  seed: 42

advanced:
  use_cuda: true
  num_workers: 0
